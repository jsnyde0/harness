# core-manifest.toml (harness-expressed)
# Machine-readable boundary for the harness public-core tree.
# Re-expressed from the two-home source manifest to harness-relative coordinates.
# Governed by ADR-002 D7 (D7.3 in particular): central manifest, private-by-default.
#
# PRIVATE-BY-DEFAULT: any asset NOT listed here is private and does not publish.
# Schema note: each asset entry carries:
#   path        = harness-relative path
#   home        = "harness" (single-tree, no two-home split)
#   disposition = "core" (this file contains ONLY core assets)
#   class       = asset class (adr, skill, hook, role, extension, instruction, config)
#
# Note: CC-home role projections (agents/*.md in the Claude Code home) are DROPPED here.
# They are install-time projections of agent/roles/, regenerated by install.sh.
# browser-automation appears once (agent/skills/browser-automation — the real source).

